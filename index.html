<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>kitty food</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>

<body>
    <div class="container">
        <header>
            <div class="header-left">
                <a >
                    <img src="logo.svg" alt="logo">
                </a>
                <div class="divider hide-mob"></div>
                <a href="" class="home hide-mob">Home</a>
            </div>

            <nav>
                <a  class="menu-open hide-desktop">
                    <img src="menu.svg" alt="menu">
                </a>
                <ul>
                    <li class="hide-desktop"><a href="" class="menu-close"><img src="close.svg" alt=""></a></li>
                    <li><a href="">Our Foods</a></li>
                    <li><a href="">Ingredients</a></li>
                    <li><a href="">Studies</a></li>
                    <li><a href="">FAQ</a></li>
                </ul>
            </nav>
        </header>

        <main>
            <h1>your cat will go <img src="bonkers.svg" alt="bonkers text"> </h1>
            <p class="sub-head">
                ..for the world's best testing food, sourced with only the finest Ingredients. Made with love from the
                hearts of Missipi.
            </p>
            <a href="" class="primary">
                Go Bonkers
            </a>
        </main>
        <div class="cat-container">
            <div class="cat">
                <img src="cat.png" alt="cat-image">
                <div class="inner-circle"></div>
                <div class="outer-circle"></div>
            </div>
        </div>
    </div>
    <script>
        const menu=document.querySelector('nav ul');
        const menuBtn=document.querySelector('.menu-open');
        const closeBtn=document.querySelector('.menu-close');

        menuBtn.addEventListener('click',()=>{
            menu.classList.add('open')
        })
        closeBtn.addEventListener('click',()=>{
            menu.classList.remove('open')
        })
    </script>
</body>

</html>
